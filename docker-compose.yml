services:
  backend:
    build:
      context: ./backend/Creditcore_backend
    ports:
      - "8086:8086"
    environment:
      - DB_URL=${DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --tries=1 http://localhost:8086/api/auth/login 2>&1 | grep -q 'HTTP/' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  frontend:
    build:
      context: ./frontend/frontendreactapp
    ports:
      - "3086:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8086
    restart: always
    depends_on:
      backend:
        condition: service_healthy
