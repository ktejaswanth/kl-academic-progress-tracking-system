# =============================================================================
# 🚀 KL Academic Progress Tracker — CI Pipeline
# AI-Powered CI/CD with Build, Test, Lint & Email Notifications
# =============================================================================

name: "🔄 CI Pipeline — Build, Test & Notify"

# ─── Triggers ────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ─── Environment Variables ───────────────────────────────────────────────────
env:
  JAVA_VERSION: "21"
  NODE_VERSION: "20"

# ─── Jobs ────────────────────────────────────────────────────────────────────
jobs:

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Job 1: Backend — Spring Boot Build & Test
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  backend-build:
    name: "☕ Backend — Maven Build & Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/Creditcore_backend

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4

      - name: "☕ Setup JDK ${{ env.JAVA_VERSION }}"
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "maven"

      - name: "🔧 Make Maven Wrapper Executable"
        run: chmod +x mvnw

      - name: "🏗️ Compile Backend"
        run: ./mvnw clean compile -B -q

      - name: "🧪 Run Unit Tests"
        run: ./mvnw test -B
        continue-on-error: true

      - name: "📦 Package Application"
        run: ./mvnw package -DskipTests -B -q

      - name: "📤 Upload Test Results"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/Creditcore_backend/target/surefire-reports/
          retention-days: 7

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Job 2: Frontend — React + Vite Build & Lint
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  frontend-build:
    name: "⚛️ Frontend — Lint & Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/frontendreactapp

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4

      - name: "📗 Setup Node.js ${{ env.NODE_VERSION }}"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/frontendreactapp/package-lock.json

      - name: "📦 Install Dependencies"
        run: npm ci

      - name: "🔍 Run ESLint"
        run: npm run lint
        continue-on-error: true

      - name: "🏗️ Build Production Bundle"
        run: npm run build
        env:
          # Provide a dummy API URL for build (not used at runtime)
          VITE_API_BASE_URL: "http://localhost:8086"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Job 3: Docker — Compose Build Verification
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  docker-build:
    name: "🐳 Docker — Build Verification"
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4

      - name: "🐳 Validate Docker Compose"
        run: docker compose config --quiet

      - name: "🏗️ Build Docker Images"
        run: docker compose build
        env:
          DB_URL: "jdbc:postgresql://localhost:5432/test"
          DB_USERNAME: "test"
          DB_PASSWORD: "test"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Job 4: Email Notification
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  notify:
    name: "📧 Send Email Notification"
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build, docker-build]
    if: always()

    steps:
      - name: "📧 Send Success Email"
        if: ${{ needs.backend-build.result == 'success' && needs.frontend-build.result == 'success' && needs.docker-build.result == 'success' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: true
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "✅ CI Pipeline Passed — ${{ github.repository }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "CI Bot <${{ secrets.EMAIL_USER }}>"
          html_body: |
            <div style="font-family: 'Segoe UI', Arial, sans-serif; max-width: 600px; margin: 0 auto; border: 1px solid #e0e0e0; border-radius: 12px; overflow: hidden;">
              <div style="background: linear-gradient(135deg, #10b981, #059669); padding: 24px; text-align: center;">
                <h1 style="color: white; margin: 0; font-size: 24px;">✅ CI Pipeline Passed</h1>
              </div>
              <div style="padding: 24px;">
                <table style="width: 100%; border-collapse: collapse; font-size: 14px;">
                  <tr>
                    <td style="padding: 8px 12px; font-weight: bold; color: #374151;">Repository</td>
                    <td style="padding: 8px 12px; color: #6b7280;">${{ github.repository }}</td>
                  </tr>
                  <tr style="background: #f9fafb;">
                    <td style="padding: 8px 12px; font-weight: bold; color: #374151;">Branch</td>
                    <td style="padding: 8px 12px; color: #6b7280;">${{ github.ref_name }}</td>
                  </tr>
                  <tr>
                    <td style="padding: 8px 12px; font-weight: bold; color: #374151;">Commit</td>
                    <td style="padding: 8px 12px; color: #6b7280;"><code>${{ github.sha }}</code></td>
                  </tr>
                  <tr style="background: #f9fafb;">
                    <td style="padding: 8px 12px; font-weight: bold; color: #374151;">Author</td>
                    <td style="padding: 8px 12px; color: #6b7280;">${{ github.actor }}</td>
                  </tr>
                  <tr>
                    <td style="padding: 8px 12px; font-weight: bold; color: #374151;">Event</td>
                    <td style="padding: 8px 12px; color: #6b7280;">${{ github.event_name }}</td>
                  </tr>
                </table>
                <div style="margin-top: 16px; padding: 12px; background: #ecfdf5; border-radius: 8px; border-left: 4px solid #10b981;">
                  <strong style="color: #065f46;">All Checks Passed:</strong>
                  <ul style="margin: 8px 0 0 0; padding-left: 20px; color: #047857;">
                    <li>☕ Backend Build & Test</li>
                    <li>⚛️ Frontend Lint & Build</li>
                    <li>🐳 Docker Build Verification</li>
                  </ul>
                </div>
                <div style="text-align: center; margin-top: 20px;">
                  <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                     style="display: inline-block; padding: 10px 24px; background: #10b981; color: white; text-decoration: none; border-radius: 6px; font-weight: bold;">
                    View Workflow Run →
                  </a>
                </div>
              </div>
              <div style="background: #f9fafb; padding: 12px; text-align: center; font-size: 12px; color: #9ca3af;">
                KL Academic Progress Tracking System — CI/CD Pipeline
              </div>
            </div>

      - name: "📧 Send Failure Email"
        if: ${{ needs.backend-build.result == 'failure' || needs.frontend-build.result == 'failure' || needs.docker-build.result == 'failure' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: true
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "❌ CI Pipeline Failed — ${{ github.repository }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "CI Bot <${{ secrets.EMAIL_USER }}>"
          html_body: |
            <div style="font-family: 'Segoe UI', Arial, sans-serif; max-width: 600px; margin: 0 auto; border: 1px solid #e0e0e0; border-radius: 12px; overflow: hidden;">
              <div style="background: linear-gradient(135deg, #ef4444, #dc2626); padding: 24px; text-align: center;">
                <h1 style="color: white; margin: 0; font-size: 24px;">❌ CI Pipeline Failed</h1>
              </div>
              <div style="padding: 24px;">
                <table style="width: 100%; border-collapse: collapse; font-size: 14px;">
                  <tr>
                    <td style="padding: 8px 12px; font-weight: bold; color: #374151;">Repository</td>
                    <td style="padding: 8px 12px; color: #6b7280;">${{ github.repository }}</td>
                  </tr>
                  <tr style="background: #f9fafb;">
                    <td style="padding: 8px 12px; font-weight: bold; color: #374151;">Branch</td>
                    <td style="padding: 8px 12px; color: #6b7280;">${{ github.ref_name }}</td>
                  </tr>
                  <tr>
                    <td style="padding: 8px 12px; font-weight: bold; color: #374151;">Commit</td>
                    <td style="padding: 8px 12px; color: #6b7280;"><code>${{ github.sha }}</code></td>
                  </tr>
                  <tr style="background: #f9fafb;">
                    <td style="padding: 8px 12px; font-weight: bold; color: #374151;">Author</td>
                    <td style="padding: 8px 12px; color: #6b7280;">${{ github.actor }}</td>
                  </tr>
                </table>
                <div style="margin-top: 16px; padding: 12px; background: #fef2f2; border-radius: 8px; border-left: 4px solid #ef4444;">
                  <strong style="color: #991b1b;">Job Results:</strong>
                  <ul style="margin: 8px 0 0 0; padding-left: 20px; color: #374151;">
                    <li>☕ Backend: <strong>${{ needs.backend-build.result }}</strong></li>
                    <li>⚛️ Frontend: <strong>${{ needs.frontend-build.result }}</strong></li>
                    <li>🐳 Docker: <strong>${{ needs.docker-build.result }}</strong></li>
                  </ul>
                </div>
                <div style="margin-top: 12px; padding: 12px; background: #fff7ed; border-radius: 8px; border-left: 4px solid #f59e0b;">
                  <strong style="color: #92400e;">🔍 Action Required:</strong>
                  <p style="margin: 8px 0 0 0; color: #78350f; font-size: 13px;">
                    Please check the workflow logs for detailed error information.
                    Fix the failing checks and push again to re-trigger the pipeline.
                  </p>
                </div>
                <div style="text-align: center; margin-top: 20px;">
                  <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                     style="display: inline-block; padding: 10px 24px; background: #ef4444; color: white; text-decoration: none; border-radius: 6px; font-weight: bold;">
                    View Failed Run →
                  </a>
                </div>
              </div>
              <div style="background: #f9fafb; padding: 12px; text-align: center; font-size: 12px; color: #9ca3af;">
                KL Academic Progress Tracking System — CI/CD Pipeline
              </div>
            </div>
